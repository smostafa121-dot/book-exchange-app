<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرکز تبادل کتاب قم</title>
    <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazir', 'IRANSans', sans-serif;
            padding: 16px;
            direction: rtl;
            background: #f5f7fa;
            color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            padding: 20px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.85; }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.2s;
            font-family: inherit;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.15);
        }

        .book {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-right: 4px solid #2b6cb0;
        }
        .book h3 { font-size: 16px; color: #1a365d; }
        .book .author { font-size: 13px; color: #4a5568; }
        .book .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
        }
        .book .meta span {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .book .price { font-weight: 700; color: #2b6cb0; }
        .book .discount {
            background: #e53e3e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        .info-bar .count {
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 16px;
            background: #edf2f7;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .pagination button:hover:not(:disabled) {
            background: #2b6cb0;
            color: white;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .active {
            background: #2b6cb0;
            color: white;
        }

        .loading { text-align: center; padding: 40px 0; color: #718096; }
        .error-box {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #c53030;
        }
        .empty-box { text-align: center; padding: 40px 0; color: #718096; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 مرکز تبادل کتاب قم</h1>
        <p>جریان دوبارهٔ کتاب</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 جستجوی عنوان، نویسنده یا موضوع ..." oninput="searchBooks()">
    </div>

    <div id="book-list">
        <div class="loading">در حال بارگذاری کتاب‌ها...</div>
    </div>

    <div class="pagination" id="pagination"></div>

    <script>
        // ⚠️ آدرس API خود را اینجا قرار دهید
        const API_URL = 'https://script.google.com/macros/s/AKfycbyPg1ioHfkZtDY1diQ5xX7yfoia2Hi9ZSuAGZRbTfYW5THA7-tgNjPqp3-Qi5PSOl4e9Q/exec';

        let currentPage = 1;
        let currentQuery = '';
        let totalPages = 1;

        const listDiv = document.getElementById('book-list');
        const paginationDiv = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');

        function loadBooks(page = 1, query = '') {
            listDiv.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
            
            let url = `${API_URL}?page=${page}&limit=20`;
            if (query.trim()) {
                url += `&q=${encodeURIComponent(query.trim())}`;
            }

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP error ' + response.status);
                    return response.json();
                })
                .then(result => {
                    if (result.error) {
                        throw new Error(result.message);
                    }

                    const books = result.data || [];
                    totalPages = result.totalPages || 1;
                    currentPage = result.page || 1;

                    // نمایش تعداد نتایج
                    let infoHtml = `<div class="info-bar">
                        <span class="count">${result.total} کتاب یافت شد</span>
                        <span>صفحه ${result.page} از ${result.totalPages}</span>
                    </div>`;

                    if (books.length === 0) {
                        listDiv.innerHTML = infoHtml + `<div class="empty-box"><p>📖 هیچ کتابی یافت نشد.</p></div>`;
                        paginationDiv.innerHTML = '';
                        return;
                    }

                    let booksHtml = '';
                    books.forEach(book => {
                        const title = book.title || book.عنوان || 'بدون عنوان';
                        const author = book.author || book.نویسنده || 'نامشخص';
                        const subject = book.subject || book.موضوع || 'عمومی';
                        const price = book.price || book.قیمت || 0;
                        const discount = book.discount || book.تخفیف || 0;

                        booksHtml += `
                            <div class="book">
                                <h3>${title}</h3>
                                <div class="author">✍️ ${author}</div>
                                <div class="meta">
                                    <span>📂 ${subject}</span>
                                    <span class="price">💰 ${Number(price).toLocaleString('fa-IR')} تومان</span>
                                    ${discount > 0 ? `<span class="discount">🔥 ${discount}% تخفیف</span>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    listDiv.innerHTML = infoHtml + booksHtml;
                    renderPagination(result.totalPages, result.page);
                })
                .catch(error => {
                    console.error('خطا:', error);
                    listDiv.innerHTML = `
                        <div class="error-box">
                            <p>⚠️ خطا در دریافت اطلاعات</p>
                            <p style="font-size:13px;">${error.message}</p>
                            <button onclick="loadBooks(${currentPage}, '${currentQuery}')" style="margin-top:12px;padding:8px 20px;background:#2b6cb0;color:white;border:none;border-radius:6px;cursor:pointer;">تلاش مجدد</button>
                        </div>
                    `;
                    paginationDiv.innerHTML = '';
                });
        }

        function renderPagination(totalPages, currentPage) {
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            // دکمه قبلی
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>قبلی</button>`;

            // نمایش صفحات
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="active" disabled>${i}</button>`;
                } else if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                    html += `<button onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button disabled>...</button>`;
                }
            }

            // دکمه بعدی
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>بعدی</button>`;

            paginationDiv.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            loadBooks(page, currentQuery);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchBooks() {
            const query = searchInput.value;
            currentQuery = query;
            loadBooks(1, query);
        }

        // بارگذاری اولیه
        loadBooks(1, '');
    </script>

</body>
</html>
