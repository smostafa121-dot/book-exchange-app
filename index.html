<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرکز تبادل کتاب قم</title>
    <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazir', 'IRANSans', sans-serif;
            padding: 16px;
            direction: rtl;
            background: #f5f7fa;
            color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            padding: 20px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

        /* جعبه جستجو */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.2s;
            font-family: inherit;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.15);
        }
        .search-box input::placeholder {
            color: #a0aec0;
        }

        .book {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-right: 4px solid #2b6cb0;
            transition: all 0.2s;
        }
        .book h3 { font-size: 16px; color: #1a365d; margin-bottom: 4px; }
        .book .author { font-size: 13px; color: #4a5568; }
        .book .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
        }
        .book .meta span {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .book .price { font-weight: 700; color: #2b6cb0; }
        .book .discount {
            background: #e53e3e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .loading { text-align: center; padding: 40px 0; color: #718096; }
        .error-box {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #c53030;
        }
        .empty-box { text-align: center; padding: 40px 0; color: #718096; }
        .count-badge {
            background: #edf2f7;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 مرکز تبادل کتاب قم</h1>
        <p>جریان دوبارهٔ کتاب</p>
    </div>

    <!-- جعبه جستجو -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 جستجوی عنوان، نویسنده یا موضوع ..." oninput="filterBooks()">
    </div>

    <div id="book-list">
        <div class="loading">در حال بارگذاری کتاب‌ها...</div>
    </div>

    <script>
        // ⚠️ آدرس API خود را اینجا قرار دهید
        const API_URL = 'https://script.google.com/macros/s/AKfycbzaJ70knffYjmB05AMH0r7TFJl8x2dwTCGQn16Edd7KyWyyQvsd3OkAs6QdT3Oo1OBx8g/exec';

        let allBooks = []; // ذخیره همه کتاب‌ها برای فیلتر
        const listDiv = document.getElementById('book-list');
        const searchInput = document.getElementById('searchInput');

        function renderBooks(books) {
            if (!books || books.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-box">
                        <p style="font-size:48px;">📖</p>
                        <p>هیچ کتابی با این جستجو یافت نشد.</p>
                    </div>
                `;
                return;
            }

            let html = `<div class="count-badge">${books.length} کتاب یافت شد</div>`;
            books.forEach(book => {
                const title = book.title || book.عنوان || 'بدون عنوان';
                const author = book.author || book.نویسنده || 'نامشخص';
                const subject = book.subject || book.موضوع || 'عمومی';
                const price = book.price || book.قیمت || 0;
                const discount = book.discount || book.تخفیف || 0;

                html += `
                    <div class="book">
                        <h3>${title}</h3>
                        <div class="author">✍️ ${author}</div>
                        <div class="meta">
                            <span>📂 ${subject}</span>
                            <span class="price">💰 ${Number(price).toLocaleString('fa-IR')} تومان</span>
                            ${discount > 0 ? `<span class="discount">🔥 ${discount}% تخفیف</span>` : ''}
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        function filterBooks() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) {
                renderBooks(allBooks);
                return;
            }
            const filtered = allBooks.filter(book => {
                const title = (book.title || book.عنوان || '').toLowerCase();
                const author = (book.author || book.نویسنده || '').toLowerCase();
                const subject = (book.subject || book.موضوع || '').toLowerCase();
                return title.includes(query) || author.includes(query) || subject.includes(query);
            });
            renderBooks(filtered);
        }

        // بارگذاری اولیه
        fetch(API_URL)
            .then(response => {
                if (!response.ok) throw new Error('HTTP error ' + response.status);
                return response.json();
            })
            .then(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    listDiv.innerHTML = `<div class="empty-box"><p>📖 هیچ کتابی موجود نیست.</p></div>`;
                    return;
                }
                allBooks = data;
                renderBooks(allBooks);
            })
            .catch(error => {
                console.error('خطا:', error);
                listDiv.innerHTML = `
                    <div class="error-box">
                        <p>⚠️ خطا در دریافت اطلاعات</p>
                        <p style="font-size:13px;">${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#2b6cb0;color:white;border:none;border-radius:6px;cursor:pointer;">تلاش مجدد</button>
                    </div>
                `;
            });
    </script>

</body>
</html>
