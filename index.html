<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرکز تبادل کتاب قم</title>
    <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazir', 'IRANSans', sans-serif;
            padding: 16px;
            direction: rtl;
            background: #f5f7fa;
            color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            padding: 20px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.85; }

        .search-form {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .search-row input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .search-row input:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
        }
        .search-row button {
            padding: 10px 20px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .search-row button:hover {
            background: #1a365d;
        }
        .search-row button:active {
            transform: scale(0.96);
        }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-row select {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            font-family: inherit;
            cursor: pointer;
        }
        .filter-row select:focus {
            outline: none;
            border-color: #2b6cb0;
        }
        .filter-row label {
            font-size: 13px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .book {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-right: 4px solid #2b6cb0;
        }
        .book h3 { font-size: 16px; color: #1a365d; }
        .book .author { font-size: 13px; color: #4a5568; }
        .book .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
        }
        .book .meta span {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .book .price { font-weight: 700; color: #2b6cb0; }
        .book .discount {
            background: #e53e3e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #4a5568;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-bar .count {
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 16px;
            background: #edf2f7;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .pagination button:hover:not(:disabled) {
            background: #2b6cb0;
            color: white;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .active {
            background: #2b6cb0;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2b6cb0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }
        .placeholder .icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
        }
        .placeholder .title {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 6px;
        }
        .placeholder .desc {
            font-size: 14px;
        }

        .error-box {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #c53030;
        }
        .empty-box { text-align: center; padding: 40px 0; color: #718096; }

        @media (max-width: 480px) {
            .search-row {
                flex-direction: column;
            }
            .filter-row select {
                min-width: 80px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 مرکز تبادل کتاب قم</h1>
        <p>جریان دوبارهٔ کتاب</p>
    </div>

    <!-- فرم جستجو -->
    <div class="search-form">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 کلمه مورد نظر را وارد کنید ...">
            <button onclick="searchBooks()">🔍 جستجو</button>
        </div>
        <div class="filter-row">
            <label>
                جستجو در:
                <select id="searchField">
                    <option value="all">همه موارد</option>
                    <option value="title">عنوان</option>
                    <option value="author">نویسنده</option>
                    <option value="subject">موضوع</option>
                </select>
            </label>
            <label>
                مرتب‌سازی بر اساس:
                <select id="sortField">
                    <option value="title">عنوان</option>
                    <option value="author">نویسنده</option>
                    <option value="subject">موضوع</option>
                    <option value="price">قیمت</option>
                    <option value="discount">تخفیف</option>
                </select>
            </label>
            <label>
                ترتیب:
                <select id="sortOrder">
                    <option value="asc">صعودی</option>
                    <option value="desc">نزولی</option>
                </select>
            </label>
        </div>
    </div>

    <div id="book-list">
        <!-- حالت پیش‌فرض: پیام راهنما -->
        <div class="placeholder">
            <span class="icon">📖</span>
            <div class="title">به کتابخانه خوش آمدید</div>
            <div class="desc">برای پیدا کردن کتاب مورد نظر، کلمه جستجو را وارد کنید.</div>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <script>
        // ⚠️ آدرس API خود را اینجا قرار دهید (حتماً با /exec تمام شود)
        const API_URL = 'https://script.google.com/macros/s/AKfycbyILqkqm3Qij7ymTbjPfDkdqxcoLxsK5aV_Sqp4xhFhZgQkIXdH52DDlEdVPNhkiGZZbg/exec';

        let currentPage = 1;
        let totalPages = 1;
        let currentQuery = '';
        let currentField = 'all';
        let currentSort = 'title';
        let currentOrder = 'asc';

        const listDiv = document.getElementById('book-list');
        const paginationDiv = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const searchField = document.getElementById('searchField');
        const sortField = document.getElementById('sortField');
        const sortOrder = document.getElementById('sortOrder');

        // نمایش پیام خوش‌آمدگویی (حالت پیش‌فرض)
        function showWelcome() {
            listDiv.innerHTML = `
                <div class="placeholder">
                    <span class="icon">📖</span>
                    <div class="title">به کتابخانه خوش آمدید</div>
                    <div class="desc">برای پیدا کردن کتاب مورد نظر، کلمه جستجو را وارد کنید.</div>
                </div>
            `;
            paginationDiv.innerHTML = '';
        }

        function searchBooks() {
            currentQuery = searchInput.value.trim();
            currentField = searchField.value;
            currentSort = sortField.value;
            currentOrder = sortOrder.value;
            currentPage = 1;
            loadBooks();
        }

        function loadBooks() {
            // نمایش اسپینر بارگذاری
            listDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    در حال جستجو...
                </div>
            `;
            paginationDiv.innerHTML = '';
            
            let url = `${API_URL}?page=${currentPage}&limit=20`;
            if (currentQuery) {
                url += `&q=${encodeURIComponent(currentQuery)}`;
            }
            url += `&field=${currentField}`;
            url += `&sort=${currentSort}`;
            url += `&order=${currentOrder}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP error ' + response.status);
                    return response.json();
                })
                .then(result => {
                    if (result.error) {
                        throw new Error(result.message);
                    }

                    const books = result.data || [];
                    totalPages = result.totalPages || 1;
                    currentPage = result.page || 1;

                    // اگر کلمه جستجو خالی بود، پیام راهنما نشان بده
                    if (!currentQuery) {
                        showWelcome();
                        return;
                    }

                    // اگر نتیجه‌ای پیدا نشد
                    if (books.length === 0) {
                        listDiv.innerHTML = `
                            <div class="empty-box">
                                <p style="font-size:48px;">🔍</p>
                                <p>هیچ کتابی با کلمه «${currentQuery}» یافت نشد.</p>
                                <p style="font-size:13px;color:#a0aec0;">لطفاً کلمه دیگری را امتحان کنید.</p>
                            </div>
                        `;
                        paginationDiv.innerHTML = '';
                        return;
                    }

                    // نمایش نتایج
                    let infoHtml = `<div class="info-bar">
                        <span class="count">${result.total} کتاب یافت شد</span>
                        <span>صفحه ${result.page} از ${result.totalPages}</span>
                    </div>`;

                    let booksHtml = '';
                    books.forEach(book => {
                        const title = book.title || book.عنوان || 'بدون عنوان';
                        const author = book.author || book.نویسنده || 'نامشخص';
                        const subject = book.subject || book.موضوع || 'عمومی';
                        const price = book.price || book.قیمت || 0;
                        const discount = book.discount || book.تخفیف || 0;

                        booksHtml += `
                            <div class="book">
                                <h3>${title}</h3>
                                <div class="author">✍️ ${author}</div>
                                <div class="meta">
                                    <span>📂 ${subject}</span>
                                    <span class="price">💰 ${Number(price).toLocaleString('fa-IR')} تومان</span>
                                    ${discount > 0 ? `<span class="discount">🔥 ${discount}% تخفیف</span>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    listDiv.innerHTML = infoHtml + booksHtml;
                    renderPagination(result.totalPages, result.page);
                })
                .catch(error => {
                    console.error('خطا:', error);
                    listDiv.innerHTML = `
                        <div class="error-box">
                            <p>⚠️ خطا در دریافت اطلاعات</p>
                            <p style="font-size:13px;">${error.message}</p>
                            <button onclick="loadBooks()" style="margin-top:12px;padding:8px 20px;background:#2b6cb0;color:white;border:none;border-radius:6px;cursor:pointer;">تلاش مجدد</button>
                        </div>
                    `;
                    paginationDiv.innerHTML = '';
                });
        }

        function renderPagination(totalPages, currentPage) {
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>قبلی</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="active" disabled>${i}</button>`;
                } else if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                    html += `<button onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button disabled>...</button>`;
                }
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>بعدی</button>`;

            paginationDiv.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadBooks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // پشتیبانی از کلید Enter برای جستجو
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBooks();
            }
        });

        // ============= بارگذاری اولیه =============
        // صفحه با پیام خوش‌آمدگویی نمایش داده می‌شود (بدون بارگذاری خودکار)
        showWelcome();
    </script>

</body>
</html>
